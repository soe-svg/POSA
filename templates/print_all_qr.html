<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSA – Print alle QR koder</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
        }
        
        .no-print-top {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            font-weight: bold;
            text-align: center;
        }
        .btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        .btn-back { background-color: #7f8c8d; }

        /* Gitteret til skærmvisning */
        .qr-print-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Det kompakte kort-format */
        .qr-card {
            background: white;
            border: 2px solid #2c3e50;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            box-sizing: border-box;
        }
        .qr-card h3 {
            font-size: 0.9rem;
            margin: 0 0 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e50;
        }
        .qr-card p {
            font-size: 0.7rem;
            margin: 0.5rem 0 0 0;
            color: #7f8c8d;
            font-weight: bold;
        }
        .qr-image {
            width: 130px;
            height: 130px;
            display: block;
            margin: 0 auto;
        }

        /* STRUKTURERET PRINT-STYLING (8 kort pr. A4-side) */
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }
            body { 
                background-color: white; 
                padding: 0; 
                margin: 0; 
            }
            .no-print-top { 
                display: none !important; 
            }
            
            /* Tvinger layoutet i præcis 2 kolonner til print */
            .qr-print-grid {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 15mm 10mm !important;
                padding: 5mm !important;
                margin: 0 !important;
                max-width: 100% !important;
            }
            
            /* Det fysiske mærke justeret til A4-dimensioner */
            .qr-card {
                width: 85mm;
                height: 62mm;
                border: 1px dashed #666 !important; /* Klippelinje */
                border-radius: 4px;
                padding: 5mm;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                page-break-inside: avoid;
                break-inside: avoid;
                background: transparent;
            }

            .qr-card h3 {
                font-size: 1.1rem !important;
                color: black !important;
                margin: 0 0 3mm 0 !important;
            }
            .qr-image {
                width: 38mm !important;
                height: 38mm !important;
            }
            .qr-card p {
                font-size: 0.8rem !important;
                color: #333 !important;
                margin: 2mm 0 0 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-top">
        🖨️ Forhåndsvisning: Klar til at printe {{ qr_list|length }} QR-mærker (8 mærker pr. A4-side).
        <button onclick="window.print();" class="btn">Start Printarbejde</button>
        <a href="/generate_qr" class="btn btn-back">← Gå tilbage</a>
    </div>

    <div class="qr-print-grid">
        {% for item in qr_list %}
            <div class="qr-card">
                <h3>Meld fejl/mangler</h3>
                <img src="data:image/png;base64,{{ item['qr_base64'] }}" alt="QR Kode for {{ item['name'] }}" class="qr-image">
                <p>{{ item['name'] }}</p>
            </div>
        {% endfor %}
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                window.print();
            }, 500);
        };
    </script>

</body>
</html>
